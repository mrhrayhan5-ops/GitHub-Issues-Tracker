<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- title & favicon -->
    <title>GitHub Issues Tracker | Home</title>
    <link rel="shortcut icon" href="./assets/github-logo.png" type="image/x-icon">

    <!-- icon -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <!-- google font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

    <!-- tailwind css & daisyUI -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- css -->
    <link rel="stylesheet" href="./style/style.css">

</head>

<body>
    <!-- header and search -->
    <header class="flex justify-between p-4 items-center shadow-md">
        <div class="flex gap-4 items-center">
            <div class="w-9">
                <img src="./assets/github-logo.png" alt="GitHub Logo">
            </div>
            <h1 class="text-lg font-semibold">GitHub Issues Tracker</h1>
        </div>
        <div class="flex justify-center gap-5">
            <div class="join">
                <div>
                    <label class="input validator join-item outline-none">
                        <input id="search-input" type="text" placeholder="Search Now" required />
                    </label>
                </div>
                <button onclick="searchIssues()" id="btn-search" class="btn btn-primary join-item">Search</button>
            </div>

        </div>
    </header>

    <!-- nav bar -->
    <section class="flex gap-5 w-11/12 mx-auto p-5 my-4 rounded-lg shadow-md">
        <div>
            <button id="all-btn" class="filter-btn btn btn-outline btn-primary active">All</button>
        </div>
        <div>
            <button id="open-btn" class="filter-btn btn btn-outline btn-primary">Open</button>
        </div>
        <div>
            <button id="closed-btn" class="filter-btn btn btn-outline btn-primary">closed</button>
        </div>
    </section>

    <!-- tab section -->
    <section class="flex justify-between w-11/12 mx-auto p-5 my-4 rounded-lg shadow-md">
        <div class="flex gap-3 justify-center items-center">
            <div class="p-2 bg-purple-100 rounded-full">
                <img src="./assets/Aperture.png" alt="">
            </div>
            <div>
                <h2 class="text-xl font-bold"><span id="total-count">50</span> Issues</h2>
                <p class="text-gray-500">Track and manage your project issues</p>
            </div>
        </div>
        <div class="flex gap-4 items-center">
            <p><i class="fa-solid fa-circle text-emerald-400"></i> Open</p>
            <p><i class="fa-solid fa-circle text-purple-500"></i> Closed</p>
        </div>
    </section>

    <!-- card -->
    <section id="issues-container"
        class="grid grid-cols-1 md:grid-cols-4 w-11/12 mx-auto p-5 shadow-lg rounded-lg gap-5">

    </section>


    <dialog id="issue_modal" class="modal">
        <div class="modal-box">
            <form method="dialog">
                <button class="btn btn-sm btn-circle btn-ghost absolute right-2 top-2">✕</button>
            </form>
            <h3 id="modal-title" class="text-xl font-bold"></h3>
            <div class="flex gap-2 my-2">
                <span id="modal-status"></span>
                <span id="modal-author"></span>
                <span id="modal-date"></span>
            </div>
            <div id="modal-labels" class="flex gap-2 my-3"></div>
            <p id="modal-description" class="text-gray-500 my-3"></p>
            <div class="flex justify-between mt-4">
                <div>
                    <p class="text-gray-500">Assignee:</p>
                    <p id="modal-assignee" class="font-semibold"></p>
                </div>
                <div>
                    <p class="text-gray-500">Priority:</p>
                    <span id="modal-priority"></span>
                </div>
            </div>
            <div onclick="closeModal()" class="flex justify-end mt-6">
                <button class="btn btn-primary">Close</button>
            </div>
        </div>
    </dialog>

    <!-- js -->
    <script src="./script/main.js"></script>
</body>

</html>
