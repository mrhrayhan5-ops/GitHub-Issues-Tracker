<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- title & favicon -->
    <title>GitHub Issues Tracker | Home</title>
    <link rel="shortcut icon" href="./assets/github-logo.png" type="image/x-icon">

    <!-- icon -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <!-- google font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

    <!-- tailwind css & daisyUI -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- css -->
    <link rel="stylesheet" href="style/style.css">

</head>

<body>
    <!-- header and search -->
    <header class="flex justify-between p-4 items-center shadow-md">
        <div class="flex gap-4 items-center">
            <div class="w-9">
                <img src="./assets/github-logo.png" alt="GitHub Logo">
            </div>
            <h1 class="text-lg font-semibold">GitHub Issues Tracker</h1>
        </div>
        <div class="flex justify-center gap-5">
            <div class="join">
                <div>
                    <label class="input validator join-item">
                        <input id="input-search" type="text" placeholder="Search Now" required />
                    </label>
                </div>
                <button id="btn-search" class="btn btn-primary join-item">Search</button>
            </div>
            <div><button class="btn btn-primary"><i class="fa-solid fa-plus"></i>New Issue</button></div>
        </div>
    </header>

    <!-- nab bar -->
    <section class="flex gap-5 w-11/12 mx-auto p-5 my-4 rounded-lg shadow-md">
        <div>
            <button id="all-btn" class="btn btn-outline btn-primary">All</button>
        </div>
        <div>
            <button id="open-btn" class="btn btn-outline btn-primary">Open</button>
        </div>
        <div>
            <button id="closed-btn" class="btn btn-outline btn-primary">closed</button>
        </div>
    </section>

    <!-- tab section -->
    <section class="flex justify-between w-11/12 mx-auto p-5 my-4 rounded-lg shadow-md">
        <div class="flex gap-3 justify-center items-center">
            <div class="p-2 bg-purple-100 rounded-full">
                <img src="./assets/Aperture.png" alt="">
            </div>
            <div>
                <h2 id="issues-count" class="text-xl font-bold">50 Issues</h2>
                <p class="text-gray-500">Track and manage your project issues</p>
            </div>
        </div>
        <div class="flex gap-4 items-center">
            <p><i class="fa-solid fa-circle text-emerald-400"></i> Open</p>
            <p><i class="fa-solid fa-circle text-purple-500"></i> Closed</p>
        </div>
    </section>


    <!-- js -->
    <script src="./script/main.js"></script>
</body>

</html>
